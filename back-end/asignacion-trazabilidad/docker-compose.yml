version: '3.8'

services:
  # Base de datos PostgreSQL para Asignación y Trazabilidad
  postgres:
    image: postgres:16-alpine
    container_name: asignacion_postgres
    environment:
      POSTGRES_DB: asignacion_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

volumes:
  postgres_data:
    driver: local

networks:
  app_network:
    driver: bridge
