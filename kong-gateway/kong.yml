_format_version: "3.0"
_transform: true

services:
  # ============================
  # ASIGNACIÓN Y TRAZABILIDAD
  # ============================
  - name: asignacion-service
    url: http://asignacion-trazabilidad:3002
    tags:
      - parqueadero
      - asignacion
    routes:
      - name: asignacion-api
        paths:
          - /api/asignaciones
        strip_path: false
      - name: asignacion-swagger
        paths:
          - /swagger
          - /swagger-ui.html
        strip_path: true
        tags:
          - asignacion-docs
    plugins:
      - name: cors
        config:
          origins: ["*"]
          credentials: true
      - name: rate-limiting
        config:
          minute: 100

  # ============================
  # VEHÍCULOS
  # ============================
  - name: vehiculos-service
    url: http://vehiculos:3000
    tags:
      - parqueadero
      - vehiculos
    routes:
      - name: vehiculos-api
        paths:
          - /vehiculos
        strip_path: true
      - name: vehiculos-swagger
        paths:
          - /vehiculos/swagger
          - /vehiculos/swagger-ui.html
        strip_path: false
    plugins:
      - name: cors
        config:
          origins: ["*"]
      - name: rate-limiting
        config:
          minute: 100

  # ============================
  # PERSONAS
  # ============================
  - name: personas-service
    url: http://personas:3001
    tags:
      - parqueadero
      - personas
    routes:
      - name: personas-api
        paths:
          - /personas
        strip_path: true
      - name: personas-swagger
        paths:
          - /personas/swagger
          - /personas/swagger-ui.html
        strip_path: false
    plugins:
      - name: cors
        config:
          origins: ["*"]
      - name: rate-limiting
        config:
          minute: 100

  # ============================
  # TICKETS
  # ============================
  - name: tickets-service
    url: http://ms-tickets:3003
    tags:
      - parqueadero
      - tickets
    routes:
      - name: tickets-api
        paths:
          - /tickets
        strip_path: true
      - name: tickets-sse
        paths:
          - /sse
        strip_path: true
    plugins:
      - name: cors
        config:
          origins: ["*"]
      - name: rate-limiting
        config:
          minute: 100

  # ============================
  # ZONAS
  # ============================
  - name: zonas-service
    url: http://zonas:8080
    tags:
      - parqueadero
      - zonas
    routes:
      - name: zonas-api
        paths:
          - /zonas
        strip_path: true
      - name: zonas-swagger
        paths:
          - /zonas/swagger-ui.html
          - /zonas/v3/api-docs
        strip_path: false
    plugins:
      - name: cors
        config:
          origins: ["*"]
      - name: rate-limiting
        config:
          minute: 100
