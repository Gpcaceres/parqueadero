# ============================================
# Parqueadero - Sin Kong (Desarrollo Local)
# ============================================
# Levanta todos los microservicios SIN Kong
# Úsalo cuando no tengas conexión a Docker Hub
# ============================================

services:
  # ============================================
  # BASE DE DATOS POSTGRESQL COMPARTIDA
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: parqueadero-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # ASIGNACIÓN Y TRAZABILIDAD (NestJS)
  # ============================================
  asignacion-trazabilidad:
    build:
      context: ./asignacion-trazabilidad
      dockerfile: Dockerfile
    container_name: asignacion-trazabilidad-app
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: docker
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: asignacion_db
      VEHICLE_SERVICE_URL: http://vehiculos:3000
      USER_SERVICE_URL: http://personas:3001
      ZONE_SERVICE_URL: http://zonas:8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/api/asignaciones/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================
  # VEHÍCULOS (NestJS)
  # ============================================
  vehiculos:
    build:
      context: ./vehiculos
      dockerfile: Dockerfile
    container_name: vehiculos-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: docker
      PORT: 3000
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================
  # PERSONAS (NestJS)
  # ============================================
  personas:
    build:
      context: ./personas
      dockerfile: Dockerfile
    container_name: personas-app
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: docker
      PORT: 3001
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================
  # ZONAS (Spring Boot)
  # ============================================
  zonas:
    build:
      context: ./zonas
      dockerfile: Dockerfile
    container_name: zonas-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/zonas_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

# ============================================
# VOLÚMENES
# ============================================
volumes:
  postgres_data:
    driver: local

# ============================================
# REDES
# ============================================
networks:
  parqueadero-network:
    driver: bridge
