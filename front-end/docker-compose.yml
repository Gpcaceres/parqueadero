# ============================================
# Parqueadero - Front-end
# ============================================
# Sirve los dashboards estáticos (por ahora: dashboard-cliente) por su cuenta,
# como un despliegue independiente del back-end. El navegador llama a Kong
# directamente en localhost:8000, así que este contenedor no necesita la red
# del back-end para funcionar; se une igual a "parqueadero-network" (creada
# por el compose del back-end) para que ambos stacks queden agrupados como
# un mismo despliegue lógico en Docker Desktop.
# ============================================

name: parqueadero-front-end

services:
  dashboard-cliente:
    image: nginx:alpine
    container_name: parqueadero-dashboard-cliente
    ports:
      - "8085:80"
    volumes:
      - ./dashboard-cliente:/usr/share/nginx/html:ro
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  parqueadero-network:
    external: true
