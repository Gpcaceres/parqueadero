# Dashboard en desarrollo activo: se evita que el navegador cachee
# index.html/app.js/app.css entre sí con vidas de caché distintas, lo que
# puede hacer que se sirva una combinación mezclada de versiones (por
# ejemplo, un index.html nuevo con un app.js viejo).
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        add_header Cache-Control "no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri $uri/ =404;
    }
}
