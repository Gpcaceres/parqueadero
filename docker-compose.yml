# ============================================
# Parqueadero - Compose Completo
# ============================================
# Levanta todos los microservicios:
# - Kong Gateway (8000, 8001, 8002)
# - Asignación y Trazabilidad (3002)
# - Vehículos (3000)
# - Zonas (8080)
# - Personas (3001)
# - Tickets (3003)
# - Auditoría (3004) + RabbitMQ (5672/15672)
# ============================================

# Nombra el stack como "parqueadero-back-end" para que aparezca separado del
# front-end (parqueadero-front-end) en Docker Desktop, simulando dos
# despliegues independientes que comparten la red "parqueadero-network".
name: parqueadero-back-end

services:
  # ============================================
  # BASE DE DATOS POSTGRESQL COMPARTIDA
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: parqueadero-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./back-end/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # KONG - API GATEWAY
  # ============================================
  kong-db:
    image: postgres:16-alpine
    container_name: kong-postgres
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong123
    ports:
      - "5433:5432"
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong-migration:
    image: kong:3.0-alpine
    container_name: kong-migration
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong123
    depends_on:
      kong-db:
        condition: service_healthy
    networks:
      - parqueadero-network
    restart: on-failure

  kong:
    image: kong:3.0-alpine
    container_name: kong-gateway
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong123
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"    # Kong Proxy
      - "8443:8443"    # Kong Proxy HTTPS
      - "8001:8001"    # Kong Admin API
      - "8444:8444"    # Kong Admin HTTPS
    depends_on:
      - kong-migration
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong-manager:
    image: kong:3.0-alpine
    container_name: kong-manager
    command: kong start
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong123
      KONG_ADMIN_API_URI: http://kong:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
    ports:
      - "8002:8002"    # Kong Manager UI
    depends_on:
      - kong
    networks:
      - parqueadero-network
    restart: unless-stopped

  # ============================================
  # CONFIGURACIÓN AUTOMÁTICA DE KONG
  # ============================================
  kong-setup:
    image: curlimages/curl:latest
    container_name: kong-setup
    depends_on:
      - kong
    environment:
      KONG_ADMIN: http://kong:8001
    volumes:
      - ./kong-gateway/setup-kong.sh:/setup.sh:ro
    entrypoint: /bin/sh
    command: -c "sleep 10 && sh /setup.sh"
    networks:
      - parqueadero-network
    restart: on-failure

  # ============================================
  # RABBITMQ - COLA DE EVENTOS DE AUDITORÍA
  # ============================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-audit
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # ASIGNACIÓN Y TRAZABILIDAD (NestJS)
  # ============================================
  asignacion-trazabilidad:
    build:
      context: ./back-end/asignacion-trazabilidad
      dockerfile: Dockerfile
    container_name: asignacion-trazabilidad-app
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: docker
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: asignacion_db
      VEHICLE_SERVICE_URL: http://vehiculos:3000
      USER_SERVICE_URL: http://personas:3001
      ZONE_SERVICE_URL: http://zonas:8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit.event
      JWT_SECRET: parqueadero-shared-jwt-secret-2026-min32bytes
    depends_on:
      postgres:
        condition: service_healthy
      kong:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/api/asignaciones/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================
  # VEHÍCULOS (NestJS)
  # ============================================
  vehiculos:
    build:
      context: ./back-end/vehiculos
      dockerfile: Dockerfile
    container_name: vehiculos-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: docker
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USUARIO: postgres
      DB_CONTRASENA: postgres
      DB_NOMBRE: vehiculos_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit.event
      JWT_SECRET: parqueadero-shared-jwt-secret-2026-min32bytes
    depends_on:
      postgres:
        condition: service_healthy
      kong:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================
  # PERSONAS (NestJS)
  # ============================================
  personas:
    build:
      context: ./back-end/personas
      dockerfile: Dockerfile
    container_name: personas-app
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: docker
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USUARIO: postgres
      DB_CONTRASENA: postgres
      DB_NOMBRE: personas_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit.event
      JWT_SECRET: parqueadero-shared-jwt-secret-2026-min32bytes
    depends_on:
      postgres:
        condition: service_healthy
      kong:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================
  # ZONAS (Spring Boot)
  # ============================================
  zonas:
    build:
      context: ./back-end/zonas
      dockerfile: Dockerfile
    container_name: zonas-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/zonas_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: docker
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      AUDIT_RABBITMQ_EXCHANGE: audit_exchange
      AUDIT_RABBITMQ_ROUTING_KEY: audit.event
      JWT_SECRET: parqueadero-shared-jwt-secret-2026-min32bytes
    depends_on:
      postgres:
        condition: service_healthy
      kong:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  # ============================================
  # TICKETS (NestJS)
  # ============================================
  ms-tickets:
    build:
      context: ./back-end/ms-tickets
      dockerfile: Dockerfile
    container_name: ms-tickets-app
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: docker
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USUARIO: postgres
      DB_CONTRASENA: postgres
      DB_NOMBRE: tickets_db
      VEHICLE_SERVICE_URL: http://vehiculos:3000
      USER_SERVICE_URL: http://personas:3001
      ZONE_SERVICE_URL: http://zonas:8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit.event
      JWT_SECRET: parqueadero-shared-jwt-secret-2026-min32bytes
    depends_on:
      postgres:
        condition: service_healthy
      kong:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================
  # AUDITORÍA (NestJS)
  # ============================================
  ms-audit:
    build:
      context: ./back-end/ms-audit
      dockerfile: Dockerfile
    container_name: ms-audit-app
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: docker
      PORT: 3004
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: audit_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      RABBITMQ_QUEUE: audit_queue
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit.event
      JWT_SECRET: parqueadero-shared-jwt-secret-2026-min32bytes
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 10
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kong:
        condition: service_healthy
    networks:
      - parqueadero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3004/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

# ============================================
# VOLÚMENES
# ============================================
volumes:
  postgres_data:
    name: parqueadero_postgres_data
    driver: local
  kong_db_data:
    name: parqueadero_kong_db_data
    driver: local

# ============================================
# REDES
# ============================================
networks:
  parqueadero-network:
    name: parqueadero-network
    driver: bridge
